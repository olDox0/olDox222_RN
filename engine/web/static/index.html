<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORN — AI CLI Interface</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:        #0f0d0f;
    --surface:   #19171a;
    --surface2:  #2f2e30;
    --border:    #5e5c5e;
    --accent:    #26bc5f;
    --accent2:   #197b3f;
    --success:   #3dd68c;
    --warn:      #f5a623;
    --text:      #FF6700;
    --text-dim:  #ffbe78;
    --code-bg:   #001404;
    --code-text: #a8e6a8;
    --radius:    13px;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 25px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 25px; }

  .logo-mark {
    width: 106px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 14px; font-weight: 600;
    color: #fff; letter-spacing: -1px;
  }

  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-sub  { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }

  .server-status {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 12px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 12px; height: 8px; border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .status-dot.online  { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.offline { background: #ef4444; }

  /* ── CHAT AREA ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 13px;
    animation: fadeUp 0.25s ease;
    max-width: 860px;
    width: 80%;
  }

  .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
  .msg.model { align-self: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 32px; height: 32px; border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; font-weight: 600;
  }

  .msg.user  .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .msg.model .avatar { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
    max-width: calc(100% - 44px);
  }

  .msg.user  .bubble {
    background: linear-gradient(135deg, #1e3a5f, #1a2d4f);
    border: 1px solid #2a4a7f;
    color: var(--text);
    border-bottom-right-radius: 4px;
  }

  .msg.model .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  /* ── META + SOURCE ── */
  .bubble .meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .source-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(38, 188, 95, 0.12);
    border: 1px solid rgba(38, 188, 95, 0.35);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--success);
    text-decoration: none;
    transition: background 0.2s;
  }
  .source-badge:hover { background: rgba(38, 188, 95, 0.22); }
  .source-badge::before { content: "⬡"; font-size: 9px; }

  /* ── CODE BLOCKS ── */
  .bubble pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 14px 16px;
    margin: 10px 0;
    overflow-x: auto;
    position: relative;
  }

  .bubble pre::-webkit-scrollbar { height: 3px; }
  .bubble pre::-webkit-scrollbar-thumb { background: var(--border); }

  .bubble code {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.75;
    color: var(--code-text);
    /* CRÍTICO: preserva tabs e espaços de indentação */
    white-space: pre;
    tab-size: 4;
    -moz-tab-size: 4;
  }

  .bubble p > code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent);
    border: 1px solid var(--border);
    white-space: pre;
  }

  .lang-tag {
    position: absolute;
    top: 8px; right: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .copy-btn {
    position: absolute;
    top: 8px;
    left: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied {
    color: var(--success);
    border-color: var(--success);
  }

  /* ── THINKING INDICATOR ── */
  .thinking-msg .bubble {
    display: flex; align-items: center; gap: 10px;
    color: var(--text-dim);
    font-family: var(--mono); font-size: 13px;
    padding: 14px 16px;
    flex-direction: column;
    align-items: flex-start;
  }

  .dots span {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
    40%          { opacity: 1;   transform: scale(1);   }
  }

  .progress-wrap {
    width: 280px;
    max-width: 100%;
    height: 6px;
    background: #2a2a2a;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #4ce58b);
    transition: width 0.18s ease;
  }

  /* cursor piscando — aparece enquanto tokens chegam */
  .cursor {
    display: inline-block;
    width: 7px; height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink .7s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
  
  /* dot no header muda de cor conforme estado */
  .status-dot.streaming { background: var(--success); animation: pulse .4s ease-in-out infinite; }
  .status-dot.thinking  { background: var(--warn);    animation: pulse .8s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: .4; }
    50%       { opacity: 1;  }
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--text-dim);
    text-align: center;
  }

  .empty-state .big { font-size: 48px; }
  .empty-state h2   { font-size: 20px; font-weight: 700; color: var(--text); }
  .empty-state p    { font-size: 13px; font-family: var(--mono); }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-top: 8px;
  }

  .sug-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono); font-size: 12px;
    padding: 6px 14px; border-radius: 20px;
    cursor: pointer; transition: all 0.2s;
  }
  .sug-btn:hover {
    border-color: var(--accent); color: var(--accent);
    background: rgba(38,188,95,0.05);
  }

  /* ── INPUT AREA ── */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    flex-shrink: 0;
  }


  .input-row { display: flex; gap: 10px; align-items: flex-end; }

  #promptInput {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans); font-size: 14px;
    padding: 12px 16px;
    resize: none;
    height: 48px; min-height: 48px; max-height: 200px;
    overflow-y: auto; outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  #promptInput:focus { border-color: var(--accent); }
  #promptInput::placeholder { color: var(--text-dim); }

  #sendBtn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: var(--radius);
    color: #fff; font-family: var(--sans);
    font-size: 14px; font-weight: 700;
    padding: 0 22px; height: 48px;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap; flex-shrink: 0;
  }
  #sendBtn:hover   { opacity: 0.9; }
  #sendBtn:active  { transform: scale(0.97); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hint {
    margin-top: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    text-align: center;
  }

  /* ── TIPOGRAFIA DO BUBBLE ── */
  .bubble h1, .bubble h2, .bubble h3,
  .bubble h4, .bubble h5, .bubble h6 {
    margin: 10px 0 4px 0;
    font-family: var(--sans); color: var(--text); font-weight: 700;
  }
  .bubble h3 { font-size: 14px; color: var(--accent); }
  .bubble h2 { font-size: 15px; }
  .bubble h1 { font-size: 16px; }

  .bubble p {
    margin: 6px 0; line-height: 1.8; font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble ul { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin: 2px 0; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">ORN</div>
    <div>
      <div class="logo-text">ORN</div>
      <div class="logo-sub">Qwen2.5-Coder · local · N2808</div>
    </div>
  </div>
  <div class="server-status">
    <div class="status-dot" id="dot"></div>
    <span id="statusText">verificando...</span>
  </div>
</header>

<div id="chat">
  <div class="empty-state" id="emptyState">
    <div class="big">⬡</div>
    <h2>ORN pronto</h2>
    <p>Qwen2.5-Coder · Q4_K_M · SSE4.2 · N2808</p>
    <div class="suggestions">
      <button class="sug-btn" onclick="usePrompt('bubble sort em C')">bubble sort em C</button>
      <button class="sug-btn" onclick="usePrompt('função recursiva em Python')">função recursiva Python</button>
      <button class="sug-btn" onclick="usePrompt('o que é KV-cache em LLMs')">o que é KV-cache</button>
      <button class="sug-btn" onclick="usePrompt('script batch para listar arquivos .py')">batch listar .py</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="promptInput" rows="1"
      placeholder="Pergunte ao ORN... (Enter para enviar, Shift+Enter para nova linha)"></textarea>
    <button id="sendBtn" onclick="sendPrompt()">Enviar</button>
  </div>
  <div class="hint">orn-server · 127.0.0.1:8371 · auto tokens</div>
</footer>

<script>
const chat      = document.getElementById('chat');
const empty     = document.getElementById('emptyState');
const input     = document.getElementById('promptInput');
const sendBtn   = document.getElementById('sendBtn');
const dot       = document.getElementById('dot');
const statusTxt = document.getElementById('statusText');

let busy = false;

// ── Helpers ───────────────────────────────────────────────────
function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

function setStatus(state) {
  dot.className = 'status-dot ' + state;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escCode(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Auto-resize textarea ──────────────────────────────────────
function resizeInput() {
  input.style.height = '48px';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
}
input.addEventListener('input', resizeInput);
input.addEventListener('keyup', resizeInput);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!busy) sendPrompt();
  }
});

// ── Suggestions ───────────────────────────────────────────────
function usePrompt(text) {
  input.value = text;
  input.dispatchEvent(new Event('input'));
  input.focus();
}

// ── Server status polling ─────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch('/status', { signal: AbortSignal.timeout(2000) });
    const s = await r.json();
    if (!busy) setStatus('online');
    const up = s.uptime_s || 0;
    const h  = String(Math.floor(up / 3600)).padStart(2,'0');
    const m  = String(Math.floor((up % 3600) / 60)).padStart(2,'0');
    const sc = String(Math.floor(up % 60)).padStart(2,'0');
    statusTxt.textContent = `online · ${h}:${m}:${sc} · ${s.requests||0} req`;
  } catch {
    setStatus('offline');
    statusTxt.textContent = 'servidor offline';
  }
}
checkStatus();
setInterval(checkStatus, 10000);

// ── Markdown render ───────────────────────────────────────────
function renderMarkdown(text) {
  const blocks = [];
  if ((text.match(/```/g)||[]).length % 2 === 1) text += '\n```';

  text = text.replace(/```(\w*)[ \t]*\r?\n([\s\S]*?)```/g, (_, lang, code) => {
    const codeClean = code.replace(/\n$/, '');
    const tag = lang ? `<span class="lang-tag">${escHtml(lang)}</span>` : '';
    const btn = `<button class="copy-btn" type="button">copiar</button>`;
    const idx = blocks.length;
    blocks.push(`<pre>${btn}${tag}<code>${escCode(codeClean)}</code></pre>`);
    return `\x00BLOCK${idx}\x00`;
  });

  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text = text.replace(/^#{3}\s+(.+)$/gm,'<h3>$1</h3>');
  text = text.replace(/^#{2}\s+(.+)$/gm,'<h2>$1</h2>');
  text = text.replace(/^#\s+(.+)$/gm,  '<h1>$1</h1>');
  text = text.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  text = text.replace(/\*([^*\n]+)\*/g,    '<em>$1</em>');
  text = text.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  text = text.replace(/^[-*]\s+(.+)$/gm,'<li>$1</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

  const lines = text.split('\n');
  let html = '', inPara = false;
  for (const line of lines) {
    const t = line.trim();
    const isBlock = /^<(h[1-6]|ul|li|pre|\x00BLOCK)/.test(t) || t === '';
    if (isBlock) {
      if (inPara) { html += '</p>'; inPara = false; }
      if (t) html += t + '\n';
    } else {
      if (!inPara) { html += '<p>'; inPara = true; }
      else html += '<br>';
      html += t;
    }
  }
  if (inPara) html += '</p>';
  html = html.replace(/\x00BLOCK(\d+)\x00/g, (_, i) => blocks[+i]);
  return html;
}

// ── Copy button ───────────────────────────────────────────────
async function copyCodeText(text) {
  try { await navigator.clipboard.writeText(text); return true; }
  catch {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy'); ta.remove(); return !!ok;
  }
}

chat.addEventListener('click', async (ev) => {
  const btn = ev.target.closest('.copy-btn');
  if (!btn) return;
  const code = btn.closest('pre')?.querySelector('code');
  if (!code) return;
  const ok = await copyCodeText(code.innerText || code.textContent || '');
  if (!ok) return;
  const old = btn.textContent;
  btn.textContent = 'copiado!'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = old; btn.classList.remove('copied'); }, 1200);
});

// ── Append user message ───────────────────────────────────────
function appendMsg(role, html, meta, source, sourceUrl) {
  if (empty.style.display !== 'none') empty.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'user' ? 'EU' : 'ORN';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html;
  if (meta || source) {
    const m = document.createElement('div');
    m.className = 'meta';
    if (meta) { const t = document.createElement('span'); t.textContent = meta; m.appendChild(t); }
    if (source) {
      const badge = document.createElement('a');
      badge.className = 'source-badge';
      badge.textContent = source;
      if (sourceUrl) { badge.href = sourceUrl; badge.target = '_blank'; badge.rel = 'noopener noreferrer'; }
      m.appendChild(badge);
    }
    bub.appendChild(m);
  }
  div.appendChild(av); div.appendChild(bub);
  chat.appendChild(div); scrollBottom();
  return div;
}

// ── Send ──────────────────────────────────────────────────────
async function sendPrompt() {
  const prompt = input.value.trim();
  if (!prompt || busy) return;

  busy = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = '48px';

  // Mensagem do usuário
  appendMsg('user', escHtml(prompt));

  // Bubble do modelo — aparece IMEDIATAMENTE, vazia, com cursor
  if (empty.style.display !== 'none') empty.style.display = 'none';
  const modelDiv = document.createElement('div');
  modelDiv.className = 'msg model';
  modelDiv.innerHTML = `
    <div class="avatar">ORN</div>
    <div class="bubble" id="active-bubble">
      <span id="stream-text"></span><span class="cursor" id="stream-cursor"></span>
    </div>`;
  chat.appendChild(modelDiv);
  scrollBottom();

  const streamText   = document.getElementById('stream-text');
  const streamCursor = document.getElementById('stream-cursor');
  const bubble       = document.getElementById('active-bubble');

  setStatus('streaming');
  statusTxt.textContent = 'gerando...';

  const t0 = Date.now();
  let full = '';

  try {
    const res = await fetch('/ask_stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });

    if (!res.body) throw new Error('stream indisponível');

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    outer: while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      while (buf.includes('\n')) {
        const idx  = buf.indexOf('\n');
        const line = buf.slice(0, idx).trim();
        buf = buf.slice(idx + 1);
        if (!line) continue;

        let ev;
        try { ev = JSON.parse(line); } catch { continue; }

        if (ev.event === 'chunk' && ev.delta) {
          full += ev.delta;
          // Durante streaming: texto puro (rápido, sem parse de MD)
          streamText.textContent = full;
          scrollBottom();
        }

        if (ev.event === 'done') {
          full = ev.output || full;
          break outer;
        }

        if (ev.event === 'error') {
          throw new Error(ev.error || 'erro no stream');
        }
      }
    }

    // Fim do stream: renderiza markdown completo
    streamCursor.remove();
    streamText.innerHTML = renderMarkdown(full);

  } catch (err) {
    // Fallback: chama /ask síncrono
    streamCursor.remove();
    try {
      const fb   = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt }),
      });
      const data = await fb.json();
      if (data.error) throw new Error(data.error);
      full = data.output || '';
      streamText.innerHTML = renderMarkdown(full);
    } catch (fb_err) {
      streamText.innerHTML = `<span style="color:#ef4444">⚠ ${escHtml(fb_err.message || err.message)}</span>`;
    }
  }

  // Meta linha (tempo)
  const elapsed = ((Date.now() - t0) / 1000).toFixed(2);
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = `${elapsed}s · streaming`;
  bubble.appendChild(meta);

  busy = false;
  sendBtn.disabled = false;
  setStatus('online');
  checkStatus();
  scrollBottom();
  input.focus();
}
</script>
</body>
</html>
