# ORN — colors.conf
# Formato: NOME=código_ANSI (sem \033[ e sem m)
# Lido por ColorManager.load_conf()
# OSL-18: zero dependências externas — ANSI puro.

# --- Reset e estilos ---
RESET=0
BOLD=1
DIM=2

# --- Cores base ---
RED=0;31
GREEN=0;32
YELLOW=0;33
CYAN=0;36
WHITE=0;37
DARK_GRAY=0;90

# --- Bright (usados pelo Display) ---
BRIGHT_RED=1;31
BRIGHT_GREEN=1;32
BRIGHT_YELLOW=1;33
BRIGHT_CYAN=1;36
BRIGHT_WHITE=1;37

# --- ORN identity ---
ORN_PRIMARY=1;36
ORN_SUCCESS=1;32
ORN_WARN=1;33
ORN_ERROR=1;31
ORN_INFO=0;37
ORN_DIMMED=0;90